<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula-PHP - Cálculo de Desconto</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <h1>MSCODE - Cálculo de Desconto</h1>

        <form action="index.php" method="GET">
            <label for="preco">Valor do Produto (R$):</label>
            <input type="number" step="0.01" name="preco" id="preco" value="200" placeholder="Digite o valor do produto" required min="0">

            <input type="submit" value="Calcular Desconto">
        </form>
    </main>
</body>

</html>
